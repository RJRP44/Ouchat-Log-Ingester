services:
  ouchat-log-ingester:
    depends_on:
      - postgres
    build:
      context: .
    container_name: ouchat-log-ingester
    hostname: ouchat-log-ingester
    env_file:
      - .env
    ports:
      - "3010:3010"
      - "8080:8080"
    user: "1000:1000"
    volumes:
      - ./data/uploads:/uploads:rw,z
    deploy:
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:17
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql/data:rw
      - ./db.sql:/docker-entrypoint-initdb.d/create_database.sql:ro,z
    env_file:
      - .env
    ports:
      - "5432:5432"

volumes:
  db: